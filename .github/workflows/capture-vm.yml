name: Ultimate VM Automation
on: workflow_dispatch

jobs:
  human-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright & Browsers
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run Human-Like Automation
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              recordVideo: { dir: './videos/' }
            });
            const page = await context.newPage();

            try {
              console.log('Navigating to profile...');
              await page.goto('https://github.com', { waitUntil: 'networkidle' });
              
              // Human-like pause
              await page.waitForTimeout(3000);

              console.log('Scrolling down...');
              await page.evaluate(() => window.scrollBy(0, 500));
              await page.waitForTimeout(2000);

              // Click the 'Overview' or 'Repositories' tab safely
              console.log('Clicking Repositories...');
              const repoTab = page.locator('a[data-tab-item=\"repositories\"]');
              if (await repoTab.isVisible()) {
                  await repoTab.click();
              } else {
                  // Fallback: just click the profile name
                  await page.click('h1.vcard-names');
              }
              
              await page.waitForTimeout(3000);
              await page.screenshot({ path: 'final_view.png' });

            } catch (err) {
              console.error('Action failed, but saving video anyway: ', err);
            } finally {
              // Get video path BEFORE closing
              const video = page.video();
              const videoPath = await video.path();
              
              await context.close();
              await browser.close();

              // Final step: Rename video so it is easy to find
              if (fs.existsSync(videoPath)) {
                  fs.renameSync(videoPath, './human_activity.webm');
                  console.log('Video saved as human_activity.webm');
              }
            }
          })();
          "

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vm-experience
          path: |
            human_activity.webm
            final_view.png
