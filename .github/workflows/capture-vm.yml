name: Record VM Video and Screenshot
on: workflow_dispatch

jobs:
  capture-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg firefox imagemagick

      - name: Start Recording and Browse
        run: |
          # 1. Start virtual display (1920x1080)
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          sleep 3

          # 2. Start Video Recording in background (Records for 15 seconds)
          # -f x11grab: grabs the X11 screen
          # -t 15: stops after 15 seconds
          ffmpeg -y -f x11grab -video_size 1920x1080 -i :99 -codec:v libx264 -pix_fmt yuv420p vm_video.mp4 &
          
          # 3. Give the VM some "Work" - Open Firefox
          firefox --width 1920 --height 1080 "https://github.com" &
          
          # 4. Wait for the recording to finish
          echo "Recording in progress... please wait 15 seconds."
          sleep 15
          
          # 5. Take a final screenshot of what's on screen now
          import -window root final_screenshot.png

      - name: Upload Video and Image
        uses: actions/upload-artifact@v4
        with:
          name: vm-media-capture
          path: |
            vm_video.mp4
            final_screenshot.png
