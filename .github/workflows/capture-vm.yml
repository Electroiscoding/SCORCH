name: Ultimate VM Automation
on: workflow_dispatch

jobs:
  human-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright & Browsers
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run Human-Like Automation
        run: |
          node -e "
          const { chromium } = require('playwright');

          (async () => {
            // 1. Launch browser & start high-quality recording
            const browser = await chromium.launch();
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              recordVideo: { dir: './videos/', size: { width: 1280, height: 720 } }
            });
            const page = await context.newPage();

            console.log('Stepping onto the web...');

            // 2. Human Action: Navigate
            await page.goto('https://github.com', { waitUntil: 'networkidle' });
            await page.waitForTimeout(2000);

            // 3. Human Action: Smooth Scroll
            console.log('Scrolling like a human...');
            for (let i = 0; i < 5; i++) {
              await page.mouse.wheel(0, 400);
              await page.waitForTimeout(1000);
            }

            // 4. Human Action: Hover and Click
            console.log('Interacting with elements...');
            await page.hover('a[href*=\"repositories\"]');
            await page.waitForTimeout(1000);
            await page.click('a[href*=\"repositories\"]');
            
            // 5. Final Snapshot
            await page.screenshot({ path: 'final_view.png', fullPage: true });

            // 6. CLEAN SHUTDOWN (This prevents the corrupted video error)
            await context.close();
            await browser.close();
            
            // Rename the video file to something simple
            const fs = require('fs');
            const videoPath = await page.video().path();
            fs.renameSync(videoPath, './human_activity.webm');
            
            console.log('Mission accomplished.');
          })();
          "

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vm-experience
          path: |
            human_activity.webm
            final_view.png
